apiVersion: apps/v1
kind: Deployment
metadata:
  name: flipkart-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: flipkart
  template:
    metadata:
      labels:
        app: flipkart
    spec:
      containers:
      - name: flipkart-container
        image: your-dockerhub-username/flipkart-demo:latest
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: flipkart-service
spec:
  type: NodePort
  selector:
    app: flipkart
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
      nodePort: 30007
