apiVersion: apps/v1
kind: Deployment
metadata:
  name: flipkart-app

spec:
  replicas: 2
  selector:
    matchLabels:
      app: flipkart-app

  template:
    metadata:
      labels:
        app: flipkart-app

    spec:
      containers:
      - name: flipkart-app
        image: arthikanns/flipkart-demo:latest
        ports:
        - containerPort: 80

---
apiVersion: v1
kind: Service
metadata:
  name: flipkart-service

spec:
  type: NodePort
  selector:
    app: flipkart-app

  ports:
  - port: 80
    targetPort: 80
    nodePort: 30007